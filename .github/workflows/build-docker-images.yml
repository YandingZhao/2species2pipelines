name: Build Docker Images

on:
  workflow_dispatch:
    inputs:
      images:
        description: "Which images to build (comma-separated: r,python,samap,saturn or 'all')"
        required: false
        default: "all"

env:
  REGISTRY: ghcr.io
  OWNER: yandingzhao

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    strategy:
      fail-fast: false
      matrix:
        include:
          - name: r
            dockerfile: docker/Dockerfile-r
            image: ghcr.io/yandingzhao/2species2pipelines/r-methods
          - name: python
            dockerfile: docker/Dockerfile-python
            image: ghcr.io/yandingzhao/2species2pipelines/python-methods
          - name: samap
            dockerfile: docker/Dockerfile-samap
            image: ghcr.io/yandingzhao/2species2pipelines/samap-methods
          - name: saturn
            dockerfile: docker/Dockerfile-saturn
            image: ghcr.io/yandingzhao/2species2pipelines/saturn-methods

    steps:
      - name: Check if this image is requested
        id: check
        run: |
          INPUT="${{ github.event.inputs.images }}"
          if [[ "$INPUT" == "all" ]] || echo "$INPUT" | grep -qw "${{ matrix.name }}"; then
            echo "skip=false" >> $GITHUB_OUTPUT
          else
            echo "skip=true" >> $GITHUB_OUTPUT
          fi

      - uses: actions/checkout@v4
        if: steps.check.outputs.skip == 'false'

      - uses: docker/setup-buildx-action@v3
        if: steps.check.outputs.skip == 'false'

      - uses: docker/login-action@v3
        if: steps.check.outputs.skip == 'false'
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push ${{ matrix.name }}
        if: steps.check.outputs.skip == 'false'
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ${{ matrix.dockerfile }}
          push: true
          tags: ${{ matrix.image }}:latest
          cache-from: type=gha,scope=${{ matrix.name }}
          cache-to:   type=gha,scope=${{ matrix.name }},mode=max
