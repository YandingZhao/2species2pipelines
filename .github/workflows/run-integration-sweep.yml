name: Run Integration Sweep

on:
  workflow_dispatch:

jobs:
  # ── Per-method × per-norm integration jobs ──────────────────────────────────
  integrate:
    runs-on: ubuntu-latest
    timeout-minutes: 360
    strategy:
      fail-fast: false
      max-parallel: 14
      matrix:
        include:
          # ── Python methods × Python norms ─────────────────────────────────
          - { method: bbknn,     lang: python, norm: log_norm }
          - { method: bbknn,     lang: python, norm: pearson_residuals }
          - { method: bbknn,     lang: python, norm: raw_counts }
          - { method: bbknn,     lang: python, norm: scran }
          - { method: scanorama, lang: python, norm: log_norm }
          - { method: scanorama, lang: python, norm: pearson_residuals }
          - { method: scanorama, lang: python, norm: raw_counts }
          - { method: scanorama, lang: python, norm: scran }
          - { method: scvi,      lang: python, norm: log_norm }
          - { method: scvi,      lang: python, norm: pearson_residuals }
          - { method: scvi,      lang: python, norm: raw_counts }
          - { method: scvi,      lang: python, norm: scran }
          - { method: scgen,     lang: python, norm: log_norm }
          - { method: scgen,     lang: python, norm: pearson_residuals }
          - { method: scgen,     lang: python, norm: raw_counts }
          - { method: scgen,     lang: python, norm: scran }
          # ── R methods × R norms ───────────────────────────────────────────
          - { method: harmony,  lang: r, norm: log_norm }
          - { method: harmony,  lang: r, norm: scran }
          - { method: harmony,  lang: r, norm: sctransform }
          - { method: harmony,  lang: r, norm: raw_counts }
          - { method: seurat4,  lang: r, norm: log_norm }
          - { method: seurat4,  lang: r, norm: scran }
          - { method: seurat4,  lang: r, norm: sctransform }
          - { method: seurat4,  lang: r, norm: raw_counts }
          - { method: fastmnn,  lang: r, norm: log_norm }
          - { method: fastmnn,  lang: r, norm: scran }
          - { method: fastmnn,  lang: r, norm: sctransform }
          - { method: fastmnn,  lang: r, norm: raw_counts }

    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.ref }}

      # ── Build Docker images ─────────────────────────────────────────────────
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build Python image
        if: matrix.lang == 'python'
        uses: docker/build-push-action@v5
        with:
          context: .
          file: docker/Dockerfile-python
          tags: python-methods:local
          cache-from: type=gha,scope=python-image
          cache-to: type=gha,scope=python-image,mode=max
          load: true

      - name: Build R image
        if: matrix.lang == 'r'
        uses: docker/build-push-action@v5
        with:
          context: .
          file: docker/Dockerfile-r
          tags: r-methods:local
          cache-from: type=gha,scope=r-image
          cache-to: type=gha,scope=r-image,mode=max
          load: true

      # R jobs also need Python image for evaluation (scib-metrics)
      - name: Build Python image (R evaluation)
        if: matrix.lang == 'r'
        uses: docker/build-push-action@v5
        with:
          context: .
          file: docker/Dockerfile-python
          tags: python-methods:local
          cache-from: type=gha,scope=python-image
          cache-to: type=gha,scope=python-image,mode=max
          load: true

      # ── Create output dirs ──────────────────────────────────────────────────
      - name: Create output directories
        run: mkdir -p tests/results/integration_sweep/metrics

      # ── Python integration loop ─────────────────────────────────────────────
      - name: Python integration loop
        if: matrix.lang == 'python'
        run: |
          METHOD="${{ matrix.method }}"
          NORM="${{ matrix.norm }}"
          WS="${{ github.workspace }}"

          if [ "$NORM" = "scran" ]; then
            INPUT_A=/work/tests/data/normalized/python/scran/Dog_pt15_Immune_Lymphoid_diet_scran.h5ad
            INPUT_B=/work/tests/data/normalized/python/scran/Human_X00004_Immune_Lymphoid_diet_scran.h5ad
          else
            INPUT_A=/work/tests/data/normalized/python/${NORM}/Dog_pt15_Immune_Lymphoid_diet.h5ad
            INPUT_B=/work/tests/data/normalized/python/${NORM}/Human_X00004_Immune_Lymphoid_diet.h5ad
          fi

          FS_DIR="$WS/tests/data/feature_selected/python/${NORM}"
          OUTDIR="$WS/tests/results/integration_sweep"
          METRICS="$OUTDIR/metrics"

          if [ ! -d "$FS_DIR" ]; then
            echo "No FS dir for python/${NORM} — skipping"
            exit 0
          fi

          for fs_file in "$FS_DIR"/fs_*_features.txt; do
            [ -f "$fs_file" ] || continue
            bname=$(basename "$fs_file" _features.txt)   # e.g. fs_seurat_v3_500
            n="${bname##*_}"                              # 500
            fs_method="${bname%_${n}}"                   # fs_seurat_v3
            fs_method="${fs_method#fs_}"                 # seurat_v3
            sample_id="${NORM}__${fs_method}__${n}"

            echo "=== ${METHOD} / ${NORM} / ${fs_method} / n=${n} ==="

            # Integrate
            timeout 480 docker run --rm \
              -v "$WS":/work \
              -w /work/tests/results/integration_sweep \
              python-methods:local \
              python3 /work/scripts/run_${METHOD}_module.py \
                --input_a "$INPUT_A" \
                --input_b "$INPUT_B" \
                --sample_id "$sample_id" \
                --species_a dog \
                --species_b human \
                --normalization pre_normalized \
                --features_file "/work/tests/data/feature_selected/python/${NORM}/$(basename "$fs_file")" \
              || { echo "WARN: integration failed for ${METHOD}/${sample_id}"; continue; }

            # Evaluate
            h5ad="$OUTDIR/${sample_id}_${METHOD}_integration.h5ad"
            if [ -f "$h5ad" ]; then
              timeout 120 docker run --rm \
                -v "$WS":/work \
                -w /work/tests/results/integration_sweep \
                python-methods:local \
                python3 /work/scripts/run_evaluate_integration.py \
                  --input_h5ad "/work/tests/results/integration_sweep/${sample_id}_${METHOD}_integration.h5ad" \
                || echo "WARN: evaluation failed for ${METHOD}/${sample_id}"
              rm -f "$h5ad"
            fi

            # Save metrics with fully-qualified name; clean up other outputs
            src="$OUTDIR/${sample_id}_${METHOD}_integration_scib_metrics.tsv"
            if [ -f "$src" ]; then
              cp "$src" "$METRICS/${METHOD}__${NORM}__${fs_method}__${n}.tsv"
            fi
            rm -f "$OUTDIR/${sample_id}_${METHOD}"*
          done

      # ── R integration loop ──────────────────────────────────────────────────
      - name: R integration loop
        if: matrix.lang == 'r'
        run: |
          METHOD="${{ matrix.method }}"
          NORM="${{ matrix.norm }}"
          WS="${{ github.workspace }}"

          INPUT_A=/work/tests/data/normalized/r/${NORM}/Dog_pt15_Immune_Lymphoid_diet.rds
          INPUT_B=/work/tests/data/normalized/r/${NORM}/Human_X00004_Immune_Lymphoid_diet.rds

          FS_DIR="$WS/tests/data/feature_selected/r/${NORM}"
          OUTDIR="$WS/tests/results/integration_sweep"
          METRICS="$OUTDIR/metrics"

          if [ ! -d "$FS_DIR" ]; then
            echo "No FS dir for r/${NORM} — skipping"
            exit 0
          fi

          for fs_file in "$FS_DIR"/fs_*_features.txt; do
            [ -f "$fs_file" ] || continue
            bname=$(basename "$fs_file" _features.txt)
            n="${bname##*_}"
            fs_method="${bname%_${n}}"
            fs_method="${fs_method#fs_}"
            sample_id="${NORM}__${fs_method}__${n}"

            echo "=== ${METHOD} / ${NORM} / ${fs_method} / n=${n} ==="

            # Step 1: R integration → RDS
            timeout 480 docker run --rm \
              -v "$WS":/work \
              -w /work/tests/results/integration_sweep \
              r-methods:local \
              Rscript /work/scripts/run_${METHOD}_module.R \
                --input_a "$INPUT_A" \
                --input_b "$INPUT_B" \
                --sample_id "$sample_id" \
                --species_a dog \
                --species_b human \
                --normalization pre_normalized \
                --features_file "/work/tests/data/feature_selected/r/${NORM}/$(basename "$fs_file")" \
              || { echo "WARN: R integration failed for ${METHOD}/${sample_id}"; continue; }

            rds="$OUTDIR/${sample_id}_${METHOD}_integration.rds"

            # Step 2: Convert RDS → h5ad (preserves reductions as obsm)
            if [ -f "$rds" ]; then
              timeout 120 docker run --rm \
                -v "$WS":/work \
                -w /work/tests/results/integration_sweep \
                r-methods:local \
                Rscript /work/scripts/run_seurat_to_anndata.R \
                  --input_a "/work/tests/results/integration_sweep/${sample_id}_${METHOD}_integration.rds" \
                || echo "WARN: RDS→h5ad conversion failed for ${METHOD}/${sample_id}"
              rm -f "$rds"
            fi

            # Step 3: Evaluate with scib-metrics (Python image)
            h5ad="$OUTDIR/${sample_id}_${METHOD}_integration.h5ad"
            if [ -f "$h5ad" ]; then
              timeout 120 docker run --rm \
                -v "$WS":/work \
                -w /work/tests/results/integration_sweep \
                python-methods:local \
                python3 /work/scripts/run_evaluate_integration.py \
                  --input_h5ad "/work/tests/results/integration_sweep/${sample_id}_${METHOD}_integration.h5ad" \
                || echo "WARN: evaluation failed for ${METHOD}/${sample_id}"
              rm -f "$h5ad"
            fi

            # Save metrics; clean up
            src="$OUTDIR/${sample_id}_${METHOD}_integration_scib_metrics.tsv"
            if [ -f "$src" ]; then
              cp "$src" "$METRICS/${METHOD}__${NORM}__${fs_method}__${n}.tsv"
            fi
            rm -f "$OUTDIR/${sample_id}_${METHOD}"*
          done

      # ── Upload per-job metrics as artifact ──────────────────────────────────
      - name: Upload metrics artifact
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: metrics-${{ matrix.method }}-${{ matrix.norm }}
          path: tests/results/integration_sweep/metrics/
          if-no-files-found: warn
          retention-days: 7

  # ── Aggregate all metrics and commit ────────────────────────────────────────
  aggregate:
    needs: integrate
    if: always()
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.ref }}

      - name: Download all metrics artifacts
        uses: actions/download-artifact@v4
        with:
          pattern: metrics-*
          path: tests/results/integration_sweep/raw_metrics/
          merge-multiple: true

      - name: Aggregate metrics into unified TSV
        run: |
          pip install --quiet pandas
          python3 - << 'PYEOF'
          import os, re, pandas as pd
          from pathlib import Path

          metrics_dir = Path("tests/results/integration_sweep/raw_metrics")
          all_rows = []

          for tsv_file in sorted(metrics_dir.glob("*.tsv")):
              # Filename pattern: {method}__{norm}__{fs_method}__{n_features}.tsv
              stem = tsv_file.stem
              parts = stem.split("__")
              if len(parts) != 4:
                  print(f"Unexpected filename format: {tsv_file.name}")
                  continue
              integration_method, norm, fs_method, n_str = parts
              try:
                  n_features = int(n_str)
              except ValueError:
                  print(f"Non-numeric n_features in: {tsv_file.name}")
                  continue

              try:
                  df = pd.read_csv(tsv_file, sep="\t", index_col=0)
              except Exception as e:
                  print(f"Error reading {tsv_file.name}: {e}")
                  continue

              for embedding_col in df.columns:
                  row = {
                      "integration_method": integration_method,
                      "norm": norm,
                      "fs_method": fs_method,
                      "n_features": n_features,
                      "embedding": embedding_col,
                  }
                  row.update(df[embedding_col].to_dict())
                  all_rows.append(row)

          out_path = Path("tests/results/integration_sweep/all_metrics.tsv")
          out_path.parent.mkdir(parents=True, exist_ok=True)
          if all_rows:
              pd.DataFrame(all_rows).to_csv(out_path, sep="\t", index=False)
              print(f"Wrote {len(all_rows)} rows to {out_path}")
          else:
              out_path.write_text("No metrics collected\n")
              print("WARNING: no metrics rows found")
          PYEOF

      - name: Commit results
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add tests/results/integration_sweep/all_metrics.tsv
          if git diff --cached --quiet; then
            echo "No changes to commit"
          else
            git commit -m "chore: integration sweep all_metrics.tsv [skip ci]"
            git push origin HEAD:${{ github.ref_name }}
          fi
