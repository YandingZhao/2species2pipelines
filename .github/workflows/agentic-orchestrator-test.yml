name: Agentic Orchestrator Test

on:
  push:
    branches:
      - feat/agentic-tool
  pull_request:
    branches:
      - main
  workflow_dispatch:

env:
  REGISTRY: ghcr.io
  R_IMAGE: ghcr.io/break-through-cancer/2species2pipelines/r-methods:latest
  PYTHON_IMAGE: ghcr.io/break-through-cancer/2species2pipelines/python-methods:latest
  OUTDIR: ${{ github.workspace }}/tests/results/all_methods_test

jobs:

  # ── Unit test: aggregate score formula (no Docker needed) ───────────────────
  unit-test-aggregate-score:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install minimal deps
        run: pip install pandas numpy pytest

      - name: Run aggregate score unit tests
        run: pytest tests/test_aggregate_metrics.py -v

  # ── Full all-methods test using published Docker images ─────────────────────
  all-methods-test:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: read

    steps:
      - uses: actions/checkout@v4

      - name: Log in to ghcr.io
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GHCR_TOKEN }}

      - name: Pull Docker images
        run: |
          docker pull ${{ env.R_IMAGE }}
          docker pull ${{ env.PYTHON_IMAGE }}

      - name: Create output directory
        run: mkdir -p ${{ env.OUTDIR }}

      # ── Preprocessing (shared across all methods) ──────────────────────────

      - name: Ortholog conversion  [R]
        run: |
          docker run --rm \
            -v ${{ github.workspace }}:/work \
            -w ${{ env.OUTDIR }} \
            ${{ env.R_IMAGE }} \
            Rscript /work/scripts/run_ortholog_convert_pair.R \
              --input_a /work/tests/data/data/Dog_pt15_Immune_Lymphoid_diet.rds \
              --input_b /work/tests/data/data/Human_X00004_Immune_Lymphoid_diet.rds \
              --sample_id task4_demo \
              --species_a dog \
              --species_b human

      - name: Convert ortholog RDS pair → h5ad  [R]
        run: |
          docker run --rm \
            -v ${{ github.workspace }}:/work \
            -w ${{ env.OUTDIR }} \
            ${{ env.R_IMAGE }} \
            Rscript /work/scripts/run_seurat_to_anndata.R \
              --input_a ${{ env.OUTDIR }}/task4_demo_a_ortholog.rds \
              --input_b ${{ env.OUTDIR }}/task4_demo_b_ortholog.rds

      # ── R integration methods ──────────────────────────────────────────────

      - name: Harmony integration  [R]
        run: |
          docker run --rm \
            -v ${{ github.workspace }}:/work \
            -w ${{ env.OUTDIR }} \
            ${{ env.R_IMAGE }} \
            Rscript /work/scripts/run_harmony_module.R \
              --input_a ${{ env.OUTDIR }}/task4_demo_a_ortholog.rds \
              --input_b ${{ env.OUTDIR }}/task4_demo_b_ortholog.rds \
              --sample_id task4_demo \
              --species_a dog \
              --species_b human

      - name: Convert Harmony RDS → h5ad  [R]
        run: |
          docker run --rm \
            -v ${{ github.workspace }}:/work \
            -w ${{ env.OUTDIR }} \
            ${{ env.R_IMAGE }} \
            Rscript /work/scripts/run_seurat_to_anndata.R \
              --input_a ${{ env.OUTDIR }}/task4_demo_harmony_integration.rds

      - name: Seurat4 CCA integration  [R]
        run: |
          docker run --rm \
            -v ${{ github.workspace }}:/work \
            -w ${{ env.OUTDIR }} \
            ${{ env.R_IMAGE }} \
            Rscript /work/scripts/run_seurat4_module.R \
              --input_a ${{ env.OUTDIR }}/task4_demo_a_ortholog.rds \
              --input_b ${{ env.OUTDIR }}/task4_demo_b_ortholog.rds \
              --sample_id task4_demo \
              --species_a dog \
              --species_b human

      - name: Convert Seurat4 RDS → h5ad  [R]
        run: |
          docker run --rm \
            -v ${{ github.workspace }}:/work \
            -w ${{ env.OUTDIR }} \
            ${{ env.R_IMAGE }} \
            Rscript /work/scripts/run_seurat_to_anndata.R \
              --input_a ${{ env.OUTDIR }}/task4_demo_seurat4_integration.rds

      - name: fastMNN integration  [R]
        run: |
          docker run --rm \
            -v ${{ github.workspace }}:/work \
            -w ${{ env.OUTDIR }} \
            ${{ env.R_IMAGE }} \
            Rscript /work/scripts/run_fastmnn_module.R \
              --input_a ${{ env.OUTDIR }}/task4_demo_a_ortholog.rds \
              --input_b ${{ env.OUTDIR }}/task4_demo_b_ortholog.rds \
              --sample_id task4_demo \
              --species_a dog \
              --species_b human

      - name: Convert fastMNN RDS → h5ad  [R]
        run: |
          docker run --rm \
            -v ${{ github.workspace }}:/work \
            -w ${{ env.OUTDIR }} \
            ${{ env.R_IMAGE }} \
            Rscript /work/scripts/run_seurat_to_anndata.R \
              --input_a ${{ env.OUTDIR }}/task4_demo_fastmnn_integration.rds

      # ── Python integration methods ─────────────────────────────────────────

      - name: BBKNN integration  [Python]
        run: |
          docker run --rm \
            -v ${{ github.workspace }}:/work \
            -w ${{ env.OUTDIR }} \
            ${{ env.PYTHON_IMAGE }} \
            python3 /work/scripts/run_bbknn_module.py \
              --input_a ${{ env.OUTDIR }}/task4_demo_a_ortholog.h5ad \
              --input_b ${{ env.OUTDIR }}/task4_demo_b_ortholog.h5ad \
              --sample_id task4_demo \
              --species_a dog \
              --species_b human

      - name: Scanorama integration  [Python]
        run: |
          docker run --rm \
            -v ${{ github.workspace }}:/work \
            -w ${{ env.OUTDIR }} \
            ${{ env.PYTHON_IMAGE }} \
            python3 /work/scripts/run_scanorama_module.py \
              --input_a ${{ env.OUTDIR }}/task4_demo_a_ortholog.h5ad \
              --input_b ${{ env.OUTDIR }}/task4_demo_b_ortholog.h5ad \
              --sample_id task4_demo \
              --species_a dog \
              --species_b human

      - name: scVI integration  [Python]
        run: |
          docker run --rm \
            -v ${{ github.workspace }}:/work \
            -w ${{ env.OUTDIR }} \
            ${{ env.PYTHON_IMAGE }} \
            python3 /work/scripts/run_scvi_module.py \
              --input_a ${{ env.OUTDIR }}/task4_demo_a_ortholog.h5ad \
              --input_b ${{ env.OUTDIR }}/task4_demo_b_ortholog.h5ad \
              --sample_id task4_demo \
              --species_a dog \
              --species_b human

      - name: scGen integration  [Python]
        run: |
          docker run --rm \
            -v ${{ github.workspace }}:/work \
            -w ${{ env.OUTDIR }} \
            ${{ env.PYTHON_IMAGE }} \
            python3 /work/scripts/run_scgen_module.py \
              --input_a ${{ env.OUTDIR }}/task4_demo_a_ortholog.h5ad \
              --input_b ${{ env.OUTDIR }}/task4_demo_b_ortholog.h5ad \
              --sample_id task4_demo \
              --species_a dog \
              --species_b human

      # ── Evaluate all methods ───────────────────────────────────────────────

      - name: Evaluate all methods  [Python]
        run: |
          for h5ad in \
            ${{ env.OUTDIR }}/task4_demo_harmony_integration.h5ad \
            ${{ env.OUTDIR }}/task4_demo_seurat4_integration.h5ad \
            ${{ env.OUTDIR }}/task4_demo_fastmnn_integration.h5ad \
            ${{ env.OUTDIR }}/task4_demo_bbknn_integration.h5ad \
            ${{ env.OUTDIR }}/task4_demo_scanorama_integration.h5ad \
            ${{ env.OUTDIR }}/task4_demo_scvi_integration.h5ad \
            ${{ env.OUTDIR }}/task4_demo_scgen_integration.h5ad; do
            echo "=== Evaluating $h5ad ==="
            docker run --rm \
              -v ${{ github.workspace }}:/work \
              -w ${{ env.OUTDIR }} \
              ${{ env.PYTHON_IMAGE }} \
              python3 /work/scripts/run_evaluate_integration.py \
                --input_h5ad "$h5ad" || echo "WARNING: evaluation failed for $h5ad"
          done

      # ── Aggregate all metrics into one report ──────────────────────────────

      - name: Aggregate all metrics  [Python]
        run: |
          docker run --rm \
            -v ${{ github.workspace }}:/work \
            -w ${{ env.OUTDIR }} \
            ${{ env.PYTHON_IMAGE }} \
            python3 /work/scripts/aggregate_metrics.py \
              --metrics_files \
                ${{ env.OUTDIR }}/task4_demo_harmony_integration_scib_metrics.tsv \
                ${{ env.OUTDIR }}/task4_demo_seurat4_integration_scib_metrics.tsv \
                ${{ env.OUTDIR }}/task4_demo_fastmnn_integration_scib_metrics.tsv \
                ${{ env.OUTDIR }}/task4_demo_bbknn_integration_scib_metrics.tsv \
                ${{ env.OUTDIR }}/task4_demo_scanorama_integration_scib_metrics.tsv \
                ${{ env.OUTDIR }}/task4_demo_scvi_integration_scib_metrics.tsv \
                ${{ env.OUTDIR }}/task4_demo_scgen_integration_scib_metrics.tsv \
              --output_report ${{ env.OUTDIR }}/combined_metrics_report.tsv \
              --output_long   ${{ env.OUTDIR }}/combined_metrics_long.tsv \
              --output_figure ${{ env.OUTDIR }}/combined_metrics_figure.png

      # ── Print summary table ────────────────────────────────────────────────

      - name: Print full metrics report
        run: |
          echo "=== Full combined metrics report ==="
          cat tests/results/all_methods_test/combined_metrics_report.tsv

      - name: Verify aggregate score and print weighted totals
        run: |
          grep -q "Aggregate score" tests/results/all_methods_test/combined_metrics_report.tsv && \
            echo "Aggregate score row found" || \
            (echo "ERROR: Aggregate score row missing" && exit 1)
          echo ""
          echo "=== Weighted scores (0.6 bio + 0.4 batch) per method ==="
          grep "Aggregate score" tests/results/all_methods_test/combined_metrics_report.tsv

      - name: Upload all outputs
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: all-methods-test-outputs
          path: tests/results/all_methods_test/
          retention-days: 14
