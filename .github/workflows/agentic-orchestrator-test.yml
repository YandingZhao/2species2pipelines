name: Agentic Orchestrator Test

on:
  push:
    branches:
      - feat/agentic-tool
  pull_request:
    branches:
      - main
  workflow_dispatch:

env:
  REGISTRY: ghcr.io
  R_IMAGE: ghcr.io/break-through-cancer/2species2pipelines/r-methods:latest
  PYTHON_IMAGE: ghcr.io/break-through-cancer/2species2pipelines/python-methods:latest
  SAMAP_IMAGE: ghcr.io/break-through-cancer/2species2pipelines/samap-methods:latest
  SATURN_IMAGE: ghcr.io/break-through-cancer/2species2pipelines/saturn-methods:latest
  OUTDIR: ${{ github.workspace }}/tests/results/all_methods_test

jobs:

  # ── Unit test: aggregate score formula (no Docker needed) ───────────────────
  unit-test-aggregate-score:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - run: pip install pandas numpy pytest
      - run: pytest tests/test_aggregate_metrics.py -v

  # ── Detect which Dockerfiles changed ────────────────────────────────────────
  changes:
    runs-on: ubuntu-latest
    outputs:
      samap: ${{ steps.filter.outputs.samap }}
      saturn: ${{ steps.filter.outputs.saturn }}
    steps:
      - uses: actions/checkout@v4
      - uses: dorny/paths-filter@v3
        id: filter
        with:
          filters: |
            samap:
              - 'docker/Dockerfile-samap'
            saturn:
              - 'docker/Dockerfile-saturn'

  # ── Build & push SAMap image (only when Dockerfile-samap changed) ────────────
  build-samap:
    needs: changes
    if: needs.changes.outputs.samap == 'true'
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-buildx-action@v3
      - name: Compute image tags
        id: meta
        shell: bash
        run: |
          if [[ "${{ github.event_name }}" == "pull_request" ]]; then
            echo "tags=${{ env.SAMAP_IMAGE }}:pr-${{ github.event.pull_request.number }}" >> $GITHUB_OUTPUT
          else
            echo "tags=${{ env.SAMAP_IMAGE }}" >> $GITHUB_OUTPUT
          fi
      - uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GHCR_TOKEN }}
      - uses: docker/build-push-action@v6
        with:
          context: .
          file: docker/Dockerfile-samap
          push: true
          tags: ${{ steps.meta.outputs.tags }}

  # ── Build & push SATURN image (only when Dockerfile-saturn changed) ──────────
  build-saturn:
    needs: changes
    if: needs.changes.outputs.saturn == 'true'
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-buildx-action@v3
      - name: Compute image tags
        id: meta
        shell: bash
        run: |
          if [[ "${{ github.event_name }}" == "pull_request" ]]; then
            echo "tags=${{ env.SATURN_IMAGE }}:pr-${{ github.event.pull_request.number }}" >> $GITHUB_OUTPUT
          else
            echo "tags=${{ env.SATURN_IMAGE }}" >> $GITHUB_OUTPUT
          fi
      - uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GHCR_TOKEN }}
      - uses: docker/build-push-action@v6
        with:
          context: .
          file: docker/Dockerfile-saturn
          push: true
          tags: ${{ steps.meta.outputs.tags }}

  # ── All-methods test ─────────────────────────────────────────────────────────
  all-methods-test:
    needs: [build-samap, build-saturn]
    if: always()
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: read

    steps:
      - uses: actions/checkout@v4

      - uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GHCR_TOKEN }}

      - name: Pull all Docker images
        run: |
          docker pull ${{ env.R_IMAGE }}
          docker pull ${{ env.PYTHON_IMAGE }}
          docker pull ${{ env.SAMAP_IMAGE }} || echo "SAMap image not yet published — skipping SAMap test"
          docker pull ${{ env.SATURN_IMAGE }} || echo "SATURN image not yet published — skipping SATURN test"

      - name: Create output directory
        run: mkdir -p ${{ env.OUTDIR }}

      # ── Shared preprocessing ───────────────────────────────────────────────

      - name: Ortholog conversion  [R]
        run: |
          docker run --rm \
            -v ${{ github.workspace }}:/work \
            -w ${{ env.OUTDIR }} \
            ${{ env.R_IMAGE }} \
            Rscript /work/scripts/run_ortholog_convert_pair.R \
              --input_a /work/tests/data/data/Dog_pt15_Immune_Lymphoid_diet.rds \
              --input_b /work/tests/data/data/Human_X00004_Immune_Lymphoid_diet.rds \
              --sample_id task4_demo \
              --species_a dog \
              --species_b human

      - name: Convert ortholog RDS pair → h5ad  [R]
        run: |
          docker run --rm \
            -v ${{ github.workspace }}:/work \
            -w ${{ env.OUTDIR }} \
            ${{ env.R_IMAGE }} \
            Rscript /work/scripts/run_seurat_to_anndata.R \
              --input_a ${{ env.OUTDIR }}/task4_demo_a_ortholog.rds \
              --input_b ${{ env.OUTDIR }}/task4_demo_b_ortholog.rds

      # ── R methods ─────────────────────────────────────────────────────────

      - name: Harmony  [R]
        run: |
          docker run --rm -v ${{ github.workspace }}:/work -w ${{ env.OUTDIR }} ${{ env.R_IMAGE }} \
            Rscript /work/scripts/run_harmony_module.R \
              --input_a ${{ env.OUTDIR }}/task4_demo_a_ortholog.rds \
              --input_b ${{ env.OUTDIR }}/task4_demo_b_ortholog.rds \
              --sample_id task4_demo --species_a dog --species_b human
          docker run --rm -v ${{ github.workspace }}:/work -w ${{ env.OUTDIR }} ${{ env.R_IMAGE }} \
            Rscript /work/scripts/run_seurat_to_anndata.R \
              --input_a ${{ env.OUTDIR }}/task4_demo_harmony_integration.rds

      - name: Seurat4 CCA  [R]
        run: |
          docker run --rm -v ${{ github.workspace }}:/work -w ${{ env.OUTDIR }} ${{ env.R_IMAGE }} \
            Rscript /work/scripts/run_seurat4_module.R \
              --input_a ${{ env.OUTDIR }}/task4_demo_a_ortholog.rds \
              --input_b ${{ env.OUTDIR }}/task4_demo_b_ortholog.rds \
              --sample_id task4_demo --species_a dog --species_b human
          docker run --rm -v ${{ github.workspace }}:/work -w ${{ env.OUTDIR }} ${{ env.R_IMAGE }} \
            Rscript /work/scripts/run_seurat_to_anndata.R \
              --input_a ${{ env.OUTDIR }}/task4_demo_seurat4_integration.rds

      - name: fastMNN  [R]
        run: |
          docker run --rm -v ${{ github.workspace }}:/work -w ${{ env.OUTDIR }} ${{ env.R_IMAGE }} \
            Rscript /work/scripts/run_fastmnn_module.R \
              --input_a ${{ env.OUTDIR }}/task4_demo_a_ortholog.rds \
              --input_b ${{ env.OUTDIR }}/task4_demo_b_ortholog.rds \
              --sample_id task4_demo --species_a dog --species_b human
          docker run --rm -v ${{ github.workspace }}:/work -w ${{ env.OUTDIR }} ${{ env.R_IMAGE }} \
            Rscript /work/scripts/run_seurat_to_anndata.R \
              --input_a ${{ env.OUTDIR }}/task4_demo_fastmnn_integration.rds

      # ── Python methods ─────────────────────────────────────────────────────

      - name: BBKNN  [Python]
        run: |
          docker run --rm -v ${{ github.workspace }}:/work -w ${{ env.OUTDIR }} ${{ env.PYTHON_IMAGE }} \
            python3 /work/scripts/run_bbknn_module.py \
              --input_a ${{ env.OUTDIR }}/task4_demo_a_ortholog.h5ad \
              --input_b ${{ env.OUTDIR }}/task4_demo_b_ortholog.h5ad \
              --sample_id task4_demo --species_a dog --species_b human

      - name: Scanorama  [Python]
        run: |
          docker run --rm -v ${{ github.workspace }}:/work -w ${{ env.OUTDIR }} ${{ env.PYTHON_IMAGE }} \
            python3 /work/scripts/run_scanorama_module.py \
              --input_a ${{ env.OUTDIR }}/task4_demo_a_ortholog.h5ad \
              --input_b ${{ env.OUTDIR }}/task4_demo_b_ortholog.h5ad \
              --sample_id task4_demo --species_a dog --species_b human

      - name: scVI  [Python]
        run: |
          docker run --rm -v ${{ github.workspace }}:/work -w ${{ env.OUTDIR }} ${{ env.PYTHON_IMAGE }} \
            python3 /work/scripts/run_scvi_module.py \
              --input_a ${{ env.OUTDIR }}/task4_demo_a_ortholog.h5ad \
              --input_b ${{ env.OUTDIR }}/task4_demo_b_ortholog.h5ad \
              --sample_id task4_demo --species_a dog --species_b human

      - name: scGen  [Python]
        run: |
          docker run --rm -v ${{ github.workspace }}:/work -w ${{ env.OUTDIR }} ${{ env.PYTHON_IMAGE }} \
            python3 /work/scripts/run_scgen_module.py \
              --input_a ${{ env.OUTDIR }}/task4_demo_a_ortholog.h5ad \
              --input_b ${{ env.OUTDIR }}/task4_demo_b_ortholog.h5ad \
              --sample_id task4_demo --species_a dog --species_b human

      # ── SAMap (sequence-based) ─────────────────────────────────────────────

      - name: SAMap  [SAMap image]
        continue-on-error: true
        run: |
          docker image inspect ${{ env.SAMAP_IMAGE }} > /dev/null 2>&1 || \
            { echo "SAMap image not available — skipping"; exit 0; }
          docker run --rm -v ${{ github.workspace }}:/work -w ${{ env.OUTDIR }} ${{ env.SAMAP_IMAGE }} \
            python3 /work/scripts/run_samap_module.py \
              --input_a ${{ env.OUTDIR }}/task4_demo_a_ortholog.h5ad \
              --input_b ${{ env.OUTDIR }}/task4_demo_b_ortholog.h5ad \
              --sample_id task4_demo --species_a dog --species_b human

      # ── SATURN (protein language model) ───────────────────────────────────

      - name: SATURN  [SATURN image]
        continue-on-error: true
        run: |
          docker image inspect ${{ env.SATURN_IMAGE }} > /dev/null 2>&1 || \
            { echo "SATURN image not available — skipping"; exit 0; }
          docker run --rm -v ${{ github.workspace }}:/work -w ${{ env.OUTDIR }} ${{ env.SATURN_IMAGE }} \
            python3 /work/scripts/run_saturn_module.py \
              --input_a ${{ env.OUTDIR }}/task4_demo_a_ortholog.h5ad \
              --input_b ${{ env.OUTDIR }}/task4_demo_b_ortholog.h5ad \
              --sample_id task4_demo --species_a dog --species_b human

      # ── Evaluate all available h5ad outputs ───────────────────────────────

      - name: Evaluate all integration outputs  [Python]
        run: |
          for h5ad in ${{ env.OUTDIR }}/task4_demo_*_integration.h5ad; do
            echo "=== Evaluating $(basename $h5ad) ==="
            docker run --rm \
              -v ${{ github.workspace }}:/work \
              -w ${{ env.OUTDIR }} \
              ${{ env.PYTHON_IMAGE }} \
              python3 /work/scripts/run_evaluate_integration.py \
                --input_h5ad "$h5ad" \
              || echo "WARNING: evaluation failed for $(basename $h5ad)"
          done

      # ── Aggregate and report ───────────────────────────────────────────────

      - name: Aggregate all metrics  [Python]
        run: |
          METRICS_FILES=$(ls ${{ env.OUTDIR }}/*_scib_metrics.tsv 2>/dev/null | tr '\n' ' ')
          if [ -z "$METRICS_FILES" ]; then
            echo "ERROR: no metrics files found"; exit 1
          fi
          docker run --rm \
            -v ${{ github.workspace }}:/work \
            -w ${{ env.OUTDIR }} \
            ${{ env.PYTHON_IMAGE }} \
            python3 /work/scripts/aggregate_metrics.py \
              --metrics_files $METRICS_FILES \
              --output_report ${{ env.OUTDIR }}/combined_metrics_report.tsv \
              --output_long   ${{ env.OUTDIR }}/combined_metrics_long.tsv \
              --output_figure ${{ env.OUTDIR }}/combined_metrics_figure.png

      - name: Print full metrics table
        run: |
          echo "======================================================"
          echo "  FULL METRICS TABLE — all methods × all scIB metrics"
          echo "======================================================"
          cat tests/results/all_methods_test/combined_metrics_report.tsv
          echo ""
          echo "=== Weighted totals (0.6 bio + 0.4 batch) ==="
          grep "Aggregate score" tests/results/all_methods_test/combined_metrics_report.tsv || true

      - name: Upload all outputs
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: all-methods-test-outputs
          path: tests/results/all_methods_test/
          retention-days: 14
