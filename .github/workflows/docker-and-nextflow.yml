name: docker-build-and-nextflow-test

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main
  workflow_dispatch:

jobs:
  harmony-docker-and-nextflow-smoke:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build harmony image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: docker/Dockerfile
          tags: local/harmony-module:ci
          load: true

      - name: Install Nextflow
        run: |
          curl -s https://get.nextflow.io | bash
          sudo mv nextflow /usr/local/bin/nextflow

      - name: Nextflow smoke test (stub)
        run: |
          nextflow run . -profile test,docker -stub-run \
            --harmony_container local/harmony-module:ci \
            --seurat4_container local/harmony-module:ci \
            --fastmnn_container local/harmony-module:ci

      - name: Nextflow test
        run: |
          nextflow run . -profile test,docker \
            --harmony_container local/harmony-module:ci \
            --seurat4_container local/harmony-module:ci \
            --fastmnn_container local/harmony-module:ci
