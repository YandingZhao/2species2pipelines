name: CI

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main
  workflow_dispatch:

env:
  REGISTRY: ghcr.io
  R_IMAGE: ghcr.io/break-through-cancer/2species2pipelines/r-methods
  PYTHON_IMAGE: ghcr.io/break-through-cancer/2species2pipelines/python-methods

jobs:

  # ── Detect which Dockerfiles changed ────────────────────────────────────────
  changes:
    runs-on: ubuntu-latest
    outputs:
      r: ${{ steps.filter.outputs.r }}
      python: ${{ steps.filter.outputs.python }}
    steps:
      - uses: actions/checkout@v4
      - uses: dorny/paths-filter@v3
        id: filter
        with:
          filters: |
            r:
              - 'docker/Dockerfile-r'
            python:
              - 'docker/Dockerfile-python'

  # ── Build & push R image (only when Dockerfile-r changed) ───────────────────
  build-r:
    needs: changes
    if: needs.changes.outputs.r == 'true'
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Compute image tags
        id: meta
        shell: bash
        run: |
          if [[ "${{ github.event_name }}" == "pull_request" ]]; then
            echo "tags=${{ env.R_IMAGE }}:pr-${{ github.event.pull_request.number }},${{ env.R_IMAGE }}:sha-${{ github.sha }}" >> $GITHUB_OUTPUT
          else
            echo "tags=${{ env.R_IMAGE }}:latest,${{ env.R_IMAGE }}:sha-${{ github.sha }}" >> $GITHUB_OUTPUT
          fi

      - name: Log in to ghcr.io
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push r-methods image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: docker/Dockerfile-r
          push: true
          tags: ${{ steps.meta.outputs.tags }}

  # ── Build & push Python image (only when Dockerfile-python changed) ─────────
  build-python:
    needs: changes
    if: needs.changes.outputs.python == 'true'
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Compute image tags
        id: meta
        shell: bash
        run: |
          if [[ "${{ github.event_name }}" == "pull_request" ]]; then
            echo "tags=${{ env.PYTHON_IMAGE }}:pr-${{ github.event.pull_request.number }},${{ env.PYTHON_IMAGE }}:sha-${{ github.sha }}" >> $GITHUB_OUTPUT
          else
            echo "tags=${{ env.PYTHON_IMAGE }}:latest,${{ env.PYTHON_IMAGE }}:sha-${{ github.sha }}" >> $GITHUB_OUTPUT
          fi

      - name: Log in to ghcr.io
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push python-methods image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: docker/Dockerfile-python
          push: true
          tags: ${{ steps.meta.outputs.tags }}

  # ── Nextflow tests (always runs; uses published ghcr images) ────────────────
  nextflow-test:
    needs: [build-r, build-python]
    if: always()
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: read
    steps:
      - uses: actions/checkout@v4

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Log in to ghcr.io
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Install Nextflow
        run: |
          curl -s https://get.nextflow.io | bash
          sudo mv nextflow /usr/local/bin/nextflow

      - name: Select container tag (PR vs main)
        id: img
        shell: bash
        run: |
          if [[ "${{ github.event_name }}" == "pull_request" ]]; then
            echo "tag=pr-${{ github.event.pull_request.number }}" >> "$GITHUB_OUTPUT"
          else
            echo "tag=latest" >> "$GITHUB_OUTPUT"
          fi

      - name: Nextflow smoke test (stub)
        run: |
          nextflow run . -profile test,docker -stub-run \
            --harmony_container ${{ env.R_IMAGE }}:${{ steps.img.outputs.tag }} \
            --seurat4_container ${{ env.R_IMAGE }}:${{ steps.img.outputs.tag }} \
            --fastmnn_container ${{ env.R_IMAGE }}:${{ steps.img.outputs.tag }} \
            --bbknn_container ${{ env.PYTHON_IMAGE }}:${{ steps.img.outputs.tag }} \
            --scanorama_container ${{ env.PYTHON_IMAGE }}:${{ steps.img.outputs.tag }} \
            --scvi_container ${{ env.PYTHON_IMAGE }}:${{ steps.img.outputs.tag }}

      - name: Nextflow test
        run: |
          nextflow run . -profile test,docker \
            --harmony_container ${{ env.R_IMAGE }}:${{ steps.img.outputs.tag }} \
            --seurat4_container ${{ env.R_IMAGE }}:${{ steps.img.outputs.tag }} \
            --fastmnn_container ${{ env.R_IMAGE }}:${{ steps.img.outputs.tag }} \
            --bbknn_container ${{ env.PYTHON_IMAGE }}:${{ steps.img.outputs.tag }} \
            --scanorama_container ${{ env.PYTHON_IMAGE }}:${{ steps.img.outputs.tag }} \
            --scvi_container ${{ env.PYTHON_IMAGE }}:${{ steps.img.outputs.tag }}
