name: SAMap Fix Re-run
on:
  workflow_dispatch:

jobs:
  integrate:
    runs-on: ubuntu-latest
    timeout-minutes: 360
    strategy:
      fail-fast: false
      matrix:
        include:
          - { method: samap, lang: samap, norm: log_norm }
          - { method: samap, lang: samap, norm: pearson_residuals }
          - { method: samap, lang: samap, norm: raw_counts }
          - { method: samap, lang: samap, norm: scran }

    steps:
      - uses: actions/checkout@v4

      - name: Free disk space
        run: |
          sudo rm -rf /usr/share/dotnet /usr/local/lib/android /opt/ghc \
                      /opt/hostedtoolcache/CodeQL /usr/share/swift \
                      /usr/local/share/boost "$AGENT_TOOLSDIRECTORY" || true
          sudo docker image prune -af || true
          df -h

      - name: Build SAMap image
        if: matrix.lang == 'samap'
        run: docker build -t samap-methods:local -f docker/Dockerfile-samap .

      - name: Build Python image (SAMap evaluation)
        if: matrix.lang == 'samap'
        run: docker build -t python-methods:local -f docker/Dockerfile-python .

      - name: Create output directories
        run: mkdir -p tests/results/integration_sweep/metrics

      - name: SAMap integration loop
        if: matrix.lang == 'samap'
        run: |
          METHOD="samap"
          NORM="${{ matrix.norm }}"
          WS="${{ github.workspace }}"

          if [ "$NORM" = "scran" ]; then
            INPUT_A=/work/tests/data/normalized/python/scran/Dog_pt15_Immune_Lymphoid_diet_scran.h5ad
            INPUT_B=/work/tests/data/normalized/python/scran/Human_X00004_Immune_Lymphoid_diet_scran.h5ad
          else
            INPUT_A=/work/tests/data/normalized/python/${NORM}/Dog_pt15_Immune_Lymphoid_diet.h5ad
            INPUT_B=/work/tests/data/normalized/python/${NORM}/Human_X00004_Immune_Lymphoid_diet.h5ad
          fi

          FS_DIR="$WS/tests/data/feature_selected/python/${NORM}"
          OUTDIR="$WS/tests/results/integration_sweep"
          METRICS="$OUTDIR/metrics"

          run_one() {
            local sample_id="$1" fs_arg="$2"
            timeout 600 docker run --rm \
              -v "$WS":/work -w /work/tests/results/integration_sweep \
              samap-methods:local \
              python3 /work/scripts/run_samap_module.py \
                --input_a "$INPUT_A" --input_b "$INPUT_B" \
                --sample_id "$sample_id" \
                --species_a dog --species_b human \
                --normalization pre_normalized $fs_arg \
              || { echo "WARN: samap integration failed for $sample_id"; return; }
            local h5ad="$OUTDIR/${sample_id}_samap_integration.h5ad"
            [ -f "$h5ad" ] || return
            timeout 120 docker run --rm \
              -v "$WS":/work -w /work/tests/results/integration_sweep \
              python-methods:local \
              python3 /work/scripts/run_evaluate_integration.py \
                --input_h5ad "/work/tests/results/integration_sweep/${sample_id}_samap_integration.h5ad" \
              || echo "WARN: samap evaluation failed for $sample_id"
            rm -f "$h5ad"
            local src="$OUTDIR/${sample_id}_samap_integration_scib_metrics.tsv"
            [ -f "$src" ] && cp "$src" "$METRICS/samap__${sample_id}.tsv" || true
            rm -f "$OUTDIR/${sample_id}_samap"*
          }

          echo "=== samap / ${NORM} / baseline ==="
          run_one "${NORM}__none__0" ""

          [ -d "$FS_DIR" ] || exit 0
          for fs_file in "$FS_DIR"/fs_*_features.txt; do
            [ -f "$fs_file" ] || continue
            bname=$(basename "$fs_file" _features.txt)
            n="${bname##*_}"; fs_method="${bname%_${n}}"; fs_method="${fs_method#fs_}"
            sample_id="${NORM}__${fs_method}__${n}"
            echo "=== samap / ${NORM} / ${fs_method} / n=${n} ==="
            run_one "$sample_id" "--features_file /work/tests/data/feature_selected/python/${NORM}/$(basename "$fs_file")"
          done

      - name: Upload metrics artifact
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: metrics-samap-${{ matrix.norm }}
          path: tests/results/integration_sweep/metrics/samap__*.tsv
          if-no-files-found: warn

  aggregate:
    runs-on: ubuntu-latest
    needs: integrate
    if: always()
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          ref: main

      - uses: actions/download-artifact@v4
        with:
          path: downloaded_artifacts

      - name: Merge new SAMap metrics into existing all_metrics.tsv
        run: |
          python3 - <<'PYEOF'
          import os, glob, pandas as pd

          existing = "tests/results/integration_sweep/all_metrics.tsv"
          new_files = glob.glob("downloaded_artifacts/**/*.tsv", recursive=True)
          print(f"Found {len(new_files)} new SAMap metric files")

          dfs = []
          if os.path.exists(existing):
              df_old = pd.read_csv(existing, sep="\t")
              # Drop old samap rows so they get replaced with fixed ones
              df_old = df_old[df_old["integration_method"] != "samap"]
              dfs.append(df_old)
              print(f"Kept {len(df_old)} non-samap rows from existing file")

          for f in new_files:
              try:
                  df = pd.read_csv(f, sep="\t")
                  if not df.empty:
                      dfs.append(df)
                      print(f"  + {f}: {len(df)} rows")
              except Exception as e:
                  print(f"  skip {f}: {e}")

          if dfs:
              combined = pd.concat(dfs, ignore_index=True)
              os.makedirs("tests/results/integration_sweep", exist_ok=True)
              combined.to_csv(existing, sep="\t", index=False)
              print(f"Wrote {len(combined)} rows to {existing}")
          else:
              print("WARNING: no data to write")
          PYEOF

      - name: Commit results
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          mkdir -p tests/results/integration_sweep
          git add -f tests/results/integration_sweep/all_metrics.tsv
          if git diff --cached --quiet; then
            echo "No changes to commit"
          else
            git commit -m "chore: SAMap fix re-run metrics [skip ci]"
            git push origin HEAD:main
          fi
