name: Ortholog Strategy Sweep

# Benchmarks how different ortholog matching strategies (symbol, ensembl_1to1,
# ensembl_1tomany — and optionally blast_bbh_* / orthofinder when gene_map.tsv
# files are committed) affect integration quality.
#
# Pipeline per job: ortholog_convert → normalize → integrate (baseline) → evaluate
# Metrics land in:  tests/results/ortholog_sweep/all_ortholog_metrics.tsv
#
# To enable BLAST / OrthoFinder strategies, commit gene_map.tsv files to
# tests/data/ortholog_maps/{blast_bbh_60,blast_bbh_80,blast_bbh_90,orthofinder}/
# and add the corresponding matrix entries below.

on:
  workflow_dispatch:

jobs:
  # ── Per-strategy × per-method × per-norm integration jobs ───────────────────
  ortholog-integrate:
    runs-on: ubuntu-latest
    timeout-minutes: 360
    strategy:
      fail-fast: false
      max-parallel: 14
      matrix:
        include:
          # ── symbol strategy ──────────────────────────────────────────────────
          - { strategy: symbol, method: bbknn,     lang: python, norm: log_norm }
          - { strategy: symbol, method: bbknn,     lang: python, norm: raw_counts }
          - { strategy: symbol, method: bbknn,     lang: python, norm: scran }
          - { strategy: symbol, method: scanorama, lang: python, norm: log_norm }
          - { strategy: symbol, method: scanorama, lang: python, norm: raw_counts }
          - { strategy: symbol, method: scanorama, lang: python, norm: scran }
          - { strategy: symbol, method: scvi,      lang: python, norm: log_norm }
          - { strategy: symbol, method: scvi,      lang: python, norm: raw_counts }
          - { strategy: symbol, method: scvi,      lang: python, norm: scran }
          - { strategy: symbol, method: scgen,     lang: python, norm: log_norm }
          - { strategy: symbol, method: scgen,     lang: python, norm: raw_counts }
          - { strategy: symbol, method: scgen,     lang: python, norm: scran }
          - { strategy: symbol, method: samap,     lang: samap,  norm: log_norm }
          - { strategy: symbol, method: samap,     lang: samap,  norm: raw_counts }
          - { strategy: symbol, method: samap,     lang: samap,  norm: scran }
          - { strategy: symbol, method: saturn,    lang: saturn, norm: log_norm }
          - { strategy: symbol, method: saturn,    lang: saturn, norm: raw_counts }
          - { strategy: symbol, method: saturn,    lang: saturn, norm: scran }
          - { strategy: symbol, method: harmony,   lang: r,      norm: log_norm }
          - { strategy: symbol, method: harmony,   lang: r,      norm: scran }
          - { strategy: symbol, method: harmony,   lang: r,      norm: sctransform }
          - { strategy: symbol, method: seurat4,   lang: r,      norm: log_norm }
          - { strategy: symbol, method: seurat4,   lang: r,      norm: scran }
          - { strategy: symbol, method: seurat4,   lang: r,      norm: sctransform }
          - { strategy: symbol, method: fastmnn,   lang: r,      norm: log_norm }
          - { strategy: symbol, method: fastmnn,   lang: r,      norm: scran }
          - { strategy: symbol, method: fastmnn,   lang: r,      norm: sctransform }
          # ── ensembl_1to1 strategy ────────────────────────────────────────────
          - { strategy: ensembl_1to1, method: bbknn,     lang: python, norm: log_norm }
          - { strategy: ensembl_1to1, method: bbknn,     lang: python, norm: raw_counts }
          - { strategy: ensembl_1to1, method: bbknn,     lang: python, norm: scran }
          - { strategy: ensembl_1to1, method: scanorama, lang: python, norm: log_norm }
          - { strategy: ensembl_1to1, method: scanorama, lang: python, norm: raw_counts }
          - { strategy: ensembl_1to1, method: scanorama, lang: python, norm: scran }
          - { strategy: ensembl_1to1, method: scvi,      lang: python, norm: log_norm }
          - { strategy: ensembl_1to1, method: scvi,      lang: python, norm: raw_counts }
          - { strategy: ensembl_1to1, method: scvi,      lang: python, norm: scran }
          - { strategy: ensembl_1to1, method: scgen,     lang: python, norm: log_norm }
          - { strategy: ensembl_1to1, method: scgen,     lang: python, norm: raw_counts }
          - { strategy: ensembl_1to1, method: scgen,     lang: python, norm: scran }
          - { strategy: ensembl_1to1, method: samap,     lang: samap,  norm: log_norm }
          - { strategy: ensembl_1to1, method: samap,     lang: samap,  norm: raw_counts }
          - { strategy: ensembl_1to1, method: samap,     lang: samap,  norm: scran }
          - { strategy: ensembl_1to1, method: saturn,    lang: saturn, norm: log_norm }
          - { strategy: ensembl_1to1, method: saturn,    lang: saturn, norm: raw_counts }
          - { strategy: ensembl_1to1, method: saturn,    lang: saturn, norm: scran }
          - { strategy: ensembl_1to1, method: harmony,   lang: r,      norm: log_norm }
          - { strategy: ensembl_1to1, method: harmony,   lang: r,      norm: scran }
          - { strategy: ensembl_1to1, method: harmony,   lang: r,      norm: sctransform }
          - { strategy: ensembl_1to1, method: seurat4,   lang: r,      norm: log_norm }
          - { strategy: ensembl_1to1, method: seurat4,   lang: r,      norm: scran }
          - { strategy: ensembl_1to1, method: seurat4,   lang: r,      norm: sctransform }
          - { strategy: ensembl_1to1, method: fastmnn,   lang: r,      norm: log_norm }
          - { strategy: ensembl_1to1, method: fastmnn,   lang: r,      norm: scran }
          - { strategy: ensembl_1to1, method: fastmnn,   lang: r,      norm: sctransform }
          # ── ensembl_1tomany strategy ─────────────────────────────────────────
          - { strategy: ensembl_1tomany, method: bbknn,     lang: python, norm: log_norm }
          - { strategy: ensembl_1tomany, method: bbknn,     lang: python, norm: raw_counts }
          - { strategy: ensembl_1tomany, method: bbknn,     lang: python, norm: scran }
          - { strategy: ensembl_1tomany, method: scanorama, lang: python, norm: log_norm }
          - { strategy: ensembl_1tomany, method: scanorama, lang: python, norm: raw_counts }
          - { strategy: ensembl_1tomany, method: scanorama, lang: python, norm: scran }
          - { strategy: ensembl_1tomany, method: scvi,      lang: python, norm: log_norm }
          - { strategy: ensembl_1tomany, method: scvi,      lang: python, norm: raw_counts }
          - { strategy: ensembl_1tomany, method: scvi,      lang: python, norm: scran }
          - { strategy: ensembl_1tomany, method: scgen,     lang: python, norm: log_norm }
          - { strategy: ensembl_1tomany, method: scgen,     lang: python, norm: raw_counts }
          - { strategy: ensembl_1tomany, method: scgen,     lang: python, norm: scran }
          - { strategy: ensembl_1tomany, method: samap,     lang: samap,  norm: log_norm }
          - { strategy: ensembl_1tomany, method: samap,     lang: samap,  norm: raw_counts }
          - { strategy: ensembl_1tomany, method: samap,     lang: samap,  norm: scran }
          - { strategy: ensembl_1tomany, method: saturn,    lang: saturn, norm: log_norm }
          - { strategy: ensembl_1tomany, method: saturn,    lang: saturn, norm: raw_counts }
          - { strategy: ensembl_1tomany, method: saturn,    lang: saturn, norm: scran }
          - { strategy: ensembl_1tomany, method: harmony,   lang: r,      norm: log_norm }
          - { strategy: ensembl_1tomany, method: harmony,   lang: r,      norm: scran }
          - { strategy: ensembl_1tomany, method: harmony,   lang: r,      norm: sctransform }
          - { strategy: ensembl_1tomany, method: seurat4,   lang: r,      norm: log_norm }
          - { strategy: ensembl_1tomany, method: seurat4,   lang: r,      norm: scran }
          - { strategy: ensembl_1tomany, method: seurat4,   lang: r,      norm: sctransform }
          - { strategy: ensembl_1tomany, method: fastmnn,   lang: r,      norm: log_norm }
          - { strategy: ensembl_1tomany, method: fastmnn,   lang: r,      norm: scran }
          - { strategy: ensembl_1tomany, method: fastmnn,   lang: r,      norm: sctransform }

    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.ref }}

      # ── Free disk space ──────────────────────────────────────────────────────
      - name: Free disk space
        run: |
          sudo rm -rf /usr/share/dotnet /usr/local/lib/android /opt/ghc \
                      /opt/hostedtoolcache/CodeQL /usr/share/swift \
                      /usr/local/share/boost "$AGENT_TOOLSDIRECTORY"
          sudo docker image prune -af
          df -h

      # ── Build Docker images ──────────────────────────────────────────────────
      - name: Build R image
        run: docker build -t r-methods:local -f docker/Dockerfile-r .

      - name: Build Python image
        if: matrix.lang == 'python' || matrix.lang == 'r' || matrix.lang == 'samap' || matrix.lang == 'saturn'
        run: docker build -t python-methods:local -f docker/Dockerfile-python .

      - name: Build SAMap image
        if: matrix.lang == 'samap'
        run: docker build -t samap-methods:local -f docker/Dockerfile-samap .

      - name: Build SATURN image
        if: matrix.lang == 'saturn'
        run: docker build -t saturn-methods:local -f docker/Dockerfile-saturn .

      # ── Create output directories ────────────────────────────────────────────
      - name: Create output directories
        run: |
          mkdir -p tests/results/ortholog_sweep/converted
          mkdir -p tests/results/ortholog_sweep/normalized/python
          mkdir -p tests/results/ortholog_sweep/normalized/r
          mkdir -p tests/results/ortholog_sweep/metrics

      # ── Ortholog conversion ──────────────────────────────────────────────────
      - name: Ortholog conversion
        run: |
          STRATEGY="${{ matrix.strategy }}"
          WS="${{ github.workspace }}"

          MAP_ARG=""
          if [[ "$STRATEGY" == blast_bbh_* ]] || [[ "$STRATEGY" == "orthofinder" ]]; then
            MAP="$WS/tests/data/ortholog_maps/$STRATEGY/gene_map.tsv"
            if [ ! -f "$MAP" ]; then
              echo "ERROR: gene_map.tsv not found at $MAP"
              echo "Commit a pre-computed map first (see tests/data/ortholog_maps/README.md)"
              exit 1
            fi
            MAP_ARG="--map_file /work/tests/data/ortholog_maps/$STRATEGY/gene_map.tsv"
          fi

          docker run --rm \
            -v "$WS":/work \
            r-methods:local \
            Rscript /work/scripts/run_ortholog_convert.R \
              --strategy   "$STRATEGY" \
              --input_a    /work/tests/data/data/Dog_pt15_Immune_Lymphoid_diet.rds \
              --input_b    /work/tests/data/data/Human_X00004_Immune_Lymphoid_diet.rds \
              --species_a  dog \
              --species_b  human \
              --output_a   /work/tests/results/ortholog_sweep/converted/Dog_converted.rds \
              --output_b   /work/tests/results/ortholog_sweep/converted/Human_converted.rds \
              $MAP_ARG

      # ── Python/SAMap/SATURN integration loop ─────────────────────────────────
      - name: Python / SAMap / SATURN integration loop
        if: matrix.lang == 'python' || matrix.lang == 'samap' || matrix.lang == 'saturn'
        run: |
          METHOD="${{ matrix.method }}"
          NORM="${{ matrix.norm }}"
          STRATEGY="${{ matrix.strategy }}"
          WS="${{ github.workspace }}"
          CONV="$WS/tests/results/ortholog_sweep/converted"
          OUTDIR="$WS/tests/results/ortholog_sweep"
          METRICS="$OUTDIR/metrics"

          # Determine container image
          case "${{ matrix.lang }}" in
            samap)  IMG="samap-methods:local" ;;
            saturn) IMG="saturn-methods:local" ;;
            *)      IMG="python-methods:local" ;;
          esac

          # Step 1: Convert RDS → raw h5ad (using converted pair)
          docker run --rm \
            -v "$WS":/work \
            -w /work/tests/results/ortholog_sweep/converted \
            r-methods:local \
            Rscript /work/scripts/run_seurat_to_anndata.R \
              --input_a /work/tests/results/ortholog_sweep/converted/Dog_converted.rds \
              --input_b /work/tests/results/ortholog_sweep/converted/Human_converted.rds \
            || { echo "ERROR: RDS→h5ad conversion failed"; exit 1; }

          RAW_A="$CONV/Dog_converted.h5ad"
          RAW_B="$CONV/Human_converted.h5ad"

          # Step 2: Normalize
          if [ "$NORM" = "scran" ]; then
            # scran: normalize with R → RDS, then convert to h5ad
            docker run --rm \
              -v "$WS":/work \
              r-methods:local \
              Rscript /work/scripts/run_normalize_r.R \
                --input_a  /work/tests/results/ortholog_sweep/converted/Dog_converted.rds \
                --input_b  /work/tests/results/ortholog_sweep/converted/Human_converted.rds \
                --method   scran \
                --output_a /work/tests/results/ortholog_sweep/normalized/python/Dog_scran.rds \
                --output_b /work/tests/results/ortholog_sweep/normalized/python/Human_scran.rds \
              || { echo "ERROR: scran normalization failed"; exit 1; }
            docker run --rm \
              -v "$WS":/work \
              -w /work/tests/results/ortholog_sweep/normalized/python \
              r-methods:local \
              Rscript /work/scripts/run_seurat_to_anndata.R \
                --input_a /work/tests/results/ortholog_sweep/normalized/python/Dog_scran.rds \
                --input_b /work/tests/results/ortholog_sweep/normalized/python/Human_scran.rds \
              || { echo "ERROR: scran RDS→h5ad conversion failed"; exit 1; }
            INPUT_A=/work/tests/results/ortholog_sweep/normalized/python/Dog_scran.h5ad
            INPUT_B=/work/tests/results/ortholog_sweep/normalized/python/Human_scran.h5ad
          else
            # log_norm / raw_counts / pearson_residuals: Python normalizer
            docker run --rm \
              -v "$WS":/work \
              python-methods:local \
              python3 /work/scripts/run_normalize_python.py \
                --input  /work/tests/results/ortholog_sweep/converted/Dog_converted.h5ad \
                --output /work/tests/results/ortholog_sweep/normalized/python/Dog_${NORM}.h5ad \
                --method "$NORM" \
              || { echo "ERROR: Python normalization (A) failed"; exit 1; }
            docker run --rm \
              -v "$WS":/work \
              python-methods:local \
              python3 /work/scripts/run_normalize_python.py \
                --input  /work/tests/results/ortholog_sweep/converted/Human_converted.h5ad \
                --output /work/tests/results/ortholog_sweep/normalized/python/Human_${NORM}.h5ad \
                --method "$NORM" \
              || { echo "ERROR: Python normalization (B) failed"; exit 1; }
            INPUT_A=/work/tests/results/ortholog_sweep/normalized/python/Dog_${NORM}.h5ad
            INPUT_B=/work/tests/results/ortholog_sweep/normalized/python/Human_${NORM}.h5ad
          fi

          # Step 3: Baseline integration
          sample_id="${STRATEGY}__${NORM}__none__0"
          echo "=== ${METHOD} / ${STRATEGY} / ${NORM} / baseline ==="
          timeout 600 docker run --rm \
            -v "$WS":/work \
            -w /work/tests/results/ortholog_sweep \
            "$IMG" \
            python3 /work/scripts/run_${METHOD}_module.py \
              --input_a     "$INPUT_A" \
              --input_b     "$INPUT_B" \
              --sample_id   "$sample_id" \
              --species_a   dog \
              --species_b   human \
              --normalization pre_normalized \
            || echo "WARN: integration failed for ${METHOD}/${STRATEGY}/${NORM}"

          # Step 4: Evaluate
          h5ad="$OUTDIR/${sample_id}_${METHOD}_integration.h5ad"
          if [ -f "$h5ad" ]; then
            timeout 120 docker run --rm \
              -v "$WS":/work \
              -w /work/tests/results/ortholog_sweep \
              python-methods:local \
              python3 /work/scripts/run_evaluate_integration.py \
                --input_h5ad "/work/tests/results/ortholog_sweep/${sample_id}_${METHOD}_integration.h5ad" \
              || echo "WARN: evaluation failed for ${METHOD}/${STRATEGY}/${NORM}"
            rm -f "$h5ad"
          fi

          # Step 5: Save metrics with strategy-prefixed name
          src="$OUTDIR/${sample_id}_${METHOD}_integration_scib_metrics.tsv"
          [ -f "$src" ] && cp "$src" "$METRICS/${STRATEGY}__${METHOD}__${NORM}__none__0.tsv" || true
          rm -f "$OUTDIR/${sample_id}_${METHOD}"*

      # ── R integration loop ───────────────────────────────────────────────────
      - name: R integration loop
        if: matrix.lang == 'r'
        run: |
          METHOD="${{ matrix.method }}"
          NORM="${{ matrix.norm }}"
          STRATEGY="${{ matrix.strategy }}"
          WS="${{ github.workspace }}"
          CONV="$WS/tests/results/ortholog_sweep/converted"
          OUTDIR="$WS/tests/results/ortholog_sweep"
          METRICS="$OUTDIR/metrics"

          # Step 1: Normalize with R
          docker run --rm \
            -v "$WS":/work \
            r-methods:local \
            Rscript /work/scripts/run_normalize_r.R \
              --input_a  /work/tests/results/ortholog_sweep/converted/Dog_converted.rds \
              --input_b  /work/tests/results/ortholog_sweep/converted/Human_converted.rds \
              --method   "$NORM" \
              --output_a /work/tests/results/ortholog_sweep/normalized/r/Dog_${NORM}.rds \
              --output_b /work/tests/results/ortholog_sweep/normalized/r/Human_${NORM}.rds \
            || { echo "ERROR: R normalization failed"; exit 1; }

          INPUT_A=/work/tests/results/ortholog_sweep/normalized/r/Dog_${NORM}.rds
          INPUT_B=/work/tests/results/ortholog_sweep/normalized/r/Human_${NORM}.rds

          # Step 2: Baseline integration
          sample_id="${STRATEGY}__${NORM}__none__0"
          echo "=== ${METHOD} / ${STRATEGY} / ${NORM} / baseline ==="
          timeout 480 docker run --rm \
            -v "$WS":/work \
            -w /work/tests/results/ortholog_sweep \
            r-methods:local \
            Rscript /work/scripts/run_${METHOD}_module.R \
              --input_a     "$INPUT_A" \
              --input_b     "$INPUT_B" \
              --sample_id   "$sample_id" \
              --species_a   dog \
              --species_b   human \
              --normalization pre_normalized \
            || echo "WARN: R integration failed for ${METHOD}/${STRATEGY}/${NORM}"

          # Step 3: Convert RDS → h5ad
          rds="$OUTDIR/${sample_id}_${METHOD}_integration.rds"
          if [ -f "$rds" ]; then
            timeout 120 docker run --rm \
              -v "$WS":/work \
              -w /work/tests/results/ortholog_sweep \
              r-methods:local \
              Rscript /work/scripts/run_seurat_to_anndata.R \
                --input_a "/work/tests/results/ortholog_sweep/${sample_id}_${METHOD}_integration.rds" \
              || echo "WARN: RDS→h5ad conversion failed"
            rm -f "$rds"
          fi

          # Step 4: Evaluate
          h5ad="$OUTDIR/${sample_id}_${METHOD}_integration.h5ad"
          if [ -f "$h5ad" ]; then
            timeout 120 docker run --rm \
              -v "$WS":/work \
              -w /work/tests/results/ortholog_sweep \
              python-methods:local \
              python3 /work/scripts/run_evaluate_integration.py \
                --input_h5ad "/work/tests/results/ortholog_sweep/${sample_id}_${METHOD}_integration.h5ad" \
              || echo "WARN: evaluation failed for ${METHOD}/${STRATEGY}/${NORM}"
            rm -f "$h5ad"
          fi

          # Step 5: Save metrics
          src="$OUTDIR/${sample_id}_${METHOD}_integration_scib_metrics.tsv"
          [ -f "$src" ] && cp "$src" "$METRICS/${STRATEGY}__${METHOD}__${NORM}__none__0.tsv" || true
          rm -f "$OUTDIR/${sample_id}_${METHOD}"*

      # ── Upload per-job metrics artifact ─────────────────────────────────────
      - name: Upload metrics artifact
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: ortholog-metrics-${{ matrix.strategy }}-${{ matrix.method }}-${{ matrix.norm }}
          path: tests/results/ortholog_sweep/metrics/
          if-no-files-found: warn
          retention-days: 7

  # ── Aggregate all ortholog-strategy metrics and commit ───────────────────────
  aggregate:
    needs: ortholog-integrate
    if: always()
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.ref }}

      - name: Download all ortholog metrics artifacts
        uses: actions/download-artifact@v4
        with:
          pattern: ortholog-metrics-*
          path: tests/results/ortholog_sweep/raw_metrics/
          merge-multiple: true

      - name: Aggregate metrics into unified TSV
        run: |
          pip install --quiet pandas
          python3 - << 'PYEOF'
          import os, pandas as pd
          from pathlib import Path

          metrics_dir = Path("tests/results/ortholog_sweep/raw_metrics")
          all_rows = []

          for tsv_file in sorted(metrics_dir.glob("*.tsv")):
              # Filename: {strategy}__{method}__{norm}__none__0.tsv  (5 parts)
              stem = tsv_file.stem
              parts = stem.split("__")
              if len(parts) != 5:
                  print(f"Unexpected filename format (expected 5 parts): {tsv_file.name}")
                  continue
              ortholog_strategy, integration_method, norm, fs_method, n_str = parts
              try:
                  n_features = int(n_str)
              except ValueError:
                  print(f"Non-numeric n_features in: {tsv_file.name}")
                  continue

              try:
                  df = pd.read_csv(tsv_file, sep="\t", index_col=0)
              except Exception as e:
                  print(f"Error reading {tsv_file.name}: {e}")
                  continue

              for embedding_col in df.columns:
                  row = {
                      "ortholog_strategy":  ortholog_strategy,
                      "integration_method": integration_method,
                      "norm":               norm,
                      "fs_method":          fs_method,
                      "n_features":         n_features,
                      "embedding":          embedding_col,
                  }
                  row.update(df[embedding_col].to_dict())
                  all_rows.append(row)

          out_path = Path("tests/results/ortholog_sweep/all_ortholog_metrics.tsv")
          out_path.parent.mkdir(parents=True, exist_ok=True)
          if all_rows:
              pd.DataFrame(all_rows).to_csv(out_path, sep="\t", index=False)
              print(f"Wrote {len(all_rows)} rows to {out_path}")
          else:
              out_path.write_text("No metrics collected\n")
              print("WARNING: no metrics rows found")
          PYEOF

      - name: Commit results
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          mkdir -p tests/results/ortholog_sweep
          git add -f tests/results/ortholog_sweep/all_ortholog_metrics.tsv
          if git diff --cached --quiet; then
            echo "No changes to commit"
          else
            git commit -m "chore: ortholog strategy sweep all_ortholog_metrics.tsv [skip ci]"
            git push origin HEAD:${{ github.ref_name }}
          fi
